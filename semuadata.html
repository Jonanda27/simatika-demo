<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semua Data - SIMATIKA KBG</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest">
    function toggleSidebarLayout() {
      const sidebar = document.getElementById('appSidebar');
      const main = document.querySelector('.main-content');
      sidebar.classList.toggle('collapsed');
      main.classList.toggle('expanded');
    }

  </script>
  <style>
    body {
      background-color: #f1f5f9; /* Slate 100 */
      display: flex;
      min-height: 100vh;
      margin: 0;
      font-family: var(--font-sans);
    }
    
    /* SIDEBAR STYLES (from pendataan/dashboard) */
    
    
    
    .nav-label {
      padding: 0 0.75rem 0.5rem;
      font-size: 0.625rem;
      font-weight: 700;
      color: #5c7cb8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0.75rem;
      color: #8faadd;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.875rem;
      border-radius: 0.5rem;
      margin-bottom: 0.125rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .nav-item:hover {
      background-color: rgba(109, 76, 65, 0.2); 
      color: #a8c1f0;
    }
    .nav-item.active {
      background-color: #6d4b40;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); 
    }
    .nav-item-icon {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .submenu {
      margin-top: 0.25rem;
      margin-left: 1rem;
      padding-left: 0.5rem;
      border-left: 1px solid rgba(30, 41, 59, 1);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .submenu-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      color: #8faadd;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }
    .submenu-item:hover {
      color: #a8c1f0;
      background-color: rgba(109, 76, 65, 0.15);
    }
    .submenu-item.active {
      color: white;
      background-color: #875d41;
      box-shadow: 0 4px 6px -1px rgba(67, 20, 7, 0.3);
    }

    /* MAIN CONTENT */
    
    
    .content-area {
      padding: 2rem;
      max-width: 80rem;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* FILTER BUTTONS */
    .filter-btn {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid #e2e8f0;
      background: white;
      color: #475569;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .filter-btn:hover {
      background: #f8fafc;
    }
    .filter-btn.active {
      border-color: #1e293b;
      background: #1e293b;
      color: white;
    }
    /* Special colors for specific active states */
    .filter-btn.active.filter-pending { background: #d97706; border-color: #d97706; }
    .filter-btn.active.filter-stasi { background: #2563eb; border-color: #2563eb; }
    .filter-btn.active.filter-paroki { background: #059669; border-color: #059669; }
    .filter-btn.active.filter-ditolak { background: #dc2626; border-color: #dc2626; }

    /* CARD LIST */
    .list-card {
      background: white;
      border: 1px solid rgba(15, 23, 42, 0.05);
      border-bottom: 1px solid #f1f5f9;
      padding: 1.5rem;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.25rem;
    }
    .list-card:hover {
      background: #faf8f7; /* brown-50/20 */
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-stasi { background: #dbeafe; color: #1e40af; }
    .badge-paroki { background: #d1fae5; color: #065f46; }
    .badge-ditolak { background: #fee2e2; color: #991b1b; }

    .btn-outline {
      padding: 0.5rem 1rem;
      background: white;
      border: 1px solid #e2e8f0;
      color: #334155;
      font-weight: 700;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    .btn-outline:hover { background: #f8fafc; }

    .btn-primary {
      padding: 0.5rem 1rem;
      background: #654321;
      border: 1px solid #654321;
      color: white;
      font-weight: 700;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { background: #4d3319; border-color: #4d3319; }

  </style>
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

  <!-- SIDEBAR (Menu KBG) -->
    <!-- SIDEBAR -->
  <aside class="sidebar" id="appSidebar">
    <div class="sidebar-header">
      <img src="images/logo.png" alt="Logo" class="sidebar-logo-img" onerror="this.src='https://via.placeholder.com/40';">
      <div class="sidebar-brand-text">
        <span style="font-weight: 700; font-size: 1.125rem; color: white; line-height: 1.1;">SIMATIKA</span>
        <span style="font-size: 0.6875rem; color: #94a3b8;">Keuskupan Timika</span>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <p class="nav-label">MENU KBG</p>
      
      <a href="dashboard.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="home" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Dashboard KBG</span>
        </div>
      </a>
      
      <div class="nav-item " onclick="toggleSubmenu('sensus')">
        <div class="nav-item-icon">
          <i data-lucide="clipboard-list" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Sensus Umat</span>
        </div>
        <i data-lucide="chevron-down" class="submenu-chevron" style="width: 1rem; height: 1rem; transform: rotate(0deg);"></i>
      </div>
      <div class="submenu" id="submenu-sensus" style="display: none;">
        <a href="pendataan.html" class="submenu-item ">
          <div style="width: 0.375rem; height: 0.375rem; border-radius: 50%; background-color: #475569;" class="sub-dot"></div>
          <span class="nav-text">Form Pendataan</span>
        </a>
        <a href="datadraft.html" class="submenu-item ">
          <div style="width: 0.375rem; height: 0.375rem; border-radius: 50%; background-color: #475569;" class="sub-dot"></div>
          <span class="nav-text">Data Draft</span>
        </a>
      </div>
      
      <a href="semuadata.html" class="nav-item active">
        <div class="nav-item-icon">
          <i data-lucide="folder-open" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Semua Data</span>
        </div>
      </a>
      
      <a href="datakeluarga.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="user-plus" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Data Keluarga</span>
        </div>
      </a>
      
      <a href="petaumat.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="map" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Peta Umat</span>
        </div>
      </a>
      
      <a href="pengurusaktif.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="users" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Pengurus Aktif</span>
        </div>
      </a>
      
      <a href="pengajuanpengurus.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="shield-check" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Pengajuan Pengurus</span>
        </div>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="circle-badge">N</div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
        <header class="topbar">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button class="btn-hamburger" onclick="toggleSidebarLayout()">
          <i data-lucide="menu" style="width: 1.5rem; height: 1.5rem; color: #475569;"></i>
        </button>
        <h1 class="topbar-title">Semua Data</h1>
      </div>
      <div style="display: flex; align-items: center; gap: 1.25rem;">
        
        <div class="notification-wrapper">
          <i data-lucide="bell" style="width: 1.25rem; height: 1.25rem; color: #475569;"></i>
          <span class="notification-badge">5</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 0.75rem; padding-left: 1.25rem; border-left: 1px solid #e2e8f0;">
          <div style="text-align: right;">
            <p style="font-weight: 700; font-size: 0.875rem; margin: 0; color: #1e293b;">kbg_paulus</p>
            <p style="font-size: 0.75rem; color: #64748b; margin: 0;">Ketua KBG</p>
          </div>
          <div style="width: 2.5rem; height: 2.5rem; background-color: #6d4b40; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">
            KP
          </div>
        </div>
        
        <a href="index.html" class="btn-logout" title="Keluar">
          <i data-lucide="log-out" style="width: 1.25rem; height: 1.25rem; color: #334155;"></i>
        </a>
      </div>
    </header>

    <div class="content-area">
      <!-- HEADER -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
        <div>
          <h2 style="font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0;">Daftar Semua Data</h2>
          <p style="font-size: 0.875rem; color: #64748b; margin: 0.25rem 0 0 0; font-weight: 500;">Daftar seluruh riwayat pengiriman data Anda beserta status terkininya.</p>
        </div>
        <button class="btn-outline" onclick="renderData(currentFilter)" style="background: white; border-color: #e2e8f0; color: #475569;">
          <i data-lucide="refresh-cw" style="width: 1rem; height: 1rem;"></i> Segarkan Data
        </button>
      </div>

      <!-- FILTER BUTTONS -->
      <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem;" id="filterContainer">
        <button class="filter-btn active" data-filter="ALL">Semua Data</button>
        <button class="filter-btn filter-pending" data-filter="PENDING">Pending</button>
        <button class="filter-btn filter-stasi" data-filter="VERIFIED_STASI">Verifikasi Stasi</button>
        <button class="filter-btn filter-paroki" data-filter="APPROVED_PAROKI">Verifikasi Paroki</button>
        <button class="filter-btn filter-ditolak" data-filter="REJECTED">Ditolak</button>
      </div>

      <!-- DATA LIST -->
      <div style="background: white; border: 1px solid rgba(15, 23, 42, 0.05); box-shadow: var(--shadow-sm); display: flex; flex-direction: column;" id="dataContainer">
        <!-- Rendered by JS -->
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    function toggleSubmenu(id) {
      const submenu = document.getElementById('submenu-' + id);
      if (submenu.style.display === 'none') {
        submenu.style.display = 'flex';
        submenu.previousElementSibling.querySelector('i[data-lucide="chevron-down"]').style.transform = 'rotate(180deg)';
      } else {
        submenu.style.display = 'none';
        submenu.previousElementSibling.querySelector('i[data-lucide="chevron-down"]').style.transform = 'rotate(0deg)';
      }
    }

    // Dummy Data
    const dummyData = [
      {
        id: 1,
        type: 'PENDATAAN',
        title: 'Keluarga Budi Santoso',
        count: 4,
        date: '25 Jun 2026 09:15',
        status: 'PENDING'
      },
      {
        id: 2,
        type: 'PENDATAAN',
        title: 'Keluarga Siti Aminah',
        count: 2,
        date: '24 Jun 2026 14:30',
        status: 'VERIFIED_STASI'
      },
      {
        id: 3,
        type: 'KEPENGURUSAN',
        title: 'SK Pengurus KBG (Periode 2024-2027)',
        count: 5,
        date: '20 Jun 2026 10:00',
        status: 'APPROVED_PAROKI'
      },
      {
        id: 4,
        type: 'PENDATAAN',
        title: 'Keluarga Agus Pratama',
        count: 3,
        date: '18 Jun 2026 08:45',
        status: 'REJECTED',
        rejectReason: 'Foto Kartu Keluarga (KK) buram dan tidak terbaca jelas. Mohon upload ulang foto yang lebih terang.'
      },
      {
        id: 5,
        type: 'PECAH_KK',
        title: 'Pecah KK: Maria Magdalena',
        count: 1,
        date: '15 Jun 2026 16:20',
        status: 'APPROVED_PAROKI'
      }
    ];

    let currentFilter = 'ALL';

    // Render Logic
    function renderData(filter) {
      currentFilter = filter;
      const container = document.getElementById('dataContainer');
      container.innerHTML = ''; // clear

      // Filter Data
      const filtered = dummyData.filter(item => filter === 'ALL' || item.status === filter);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div style="padding: 4rem 2rem; text-align: center; display: flex; flex-direction: column; items-center; justify-content: center;">
            <div style="width: 4rem; height: 4rem; background: #f8fafc; border: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;">
              <i data-lucide="alert-circle" style="width: 2rem; height: 2rem; color: #94a3b8;"></i>
            </div>
            <h3 style="font-size: 1.125rem; font-weight: 700; color: #334155; margin: 0 0 0.25rem;">Tidak ada data</h3>
            <p style="font-size: 0.875rem; color: #64748b; margin: 0; font-weight: 500;">Belum ada riwayat pengiriman data yang sesuai dengan status ini.</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      filtered.forEach(item => {
        // Icon logic
        let iconHtml = '';
        let iconBg = '';
        let iconColor = '';
        
        if (item.type === 'KEPENGURUSAN') {
          iconHtml = '<i data-lucide="users" style="width: 1.5rem; height: 1.5rem;"></i>';
          iconBg = '#eff6ff'; // blue-50
          iconColor = '#2563eb'; // blue-600
        } else {
          iconHtml = '<i data-lucide="home" style="width: 1.5rem; height: 1.5rem;"></i>';
          iconBg = '#fbf9f8'; // brown-50
          iconColor = '#654321'; // brown-600
        }

        // Badge logic
        let badgeHtml = '';
        if (item.status === 'PENDING') {
          badgeHtml = `<div class="badge badge-pending"><i data-lucide="clock" style="width:0.875rem; height:0.875rem; margin-right:0.375rem;"></i> Menunggu Stasi</div>`;
        } else if (item.status === 'VERIFIED_STASI') {
          badgeHtml = `<div class="badge badge-stasi"><i data-lucide="check-circle" style="width:0.875rem; height:0.875rem; margin-right:0.375rem;"></i> Diverifikasi Stasi</div>`;
        } else if (item.status === 'APPROVED_PAROKI') {
          badgeHtml = `<div class="badge badge-paroki"><i data-lucide="check-circle" style="width:0.875rem; height:0.875rem; margin-right:0.375rem;"></i> Disetujui Paroki</div>`;
        } else if (item.status === 'REJECTED') {
          badgeHtml = `<div class="badge badge-ditolak"><i data-lucide="x-circle" style="width:0.875rem; height:0.875rem; margin-right:0.375rem;"></i> Ditolak</div>`;
        }

        // Reason logic (if rejected)
        let reasonHtml = '';
        if (item.status === 'REJECTED' && item.rejectReason) {
          reasonHtml = `
            <div style="margin-top: 0.75rem; font-size: 0.875rem; color: #b91c1c; background: #fef2f2; padding: 0.75rem; border-left: 4px solid #ef4444; font-weight: 500;">
              <span style="font-weight: 800; font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.05em;">Alasan Ditolak:</span><br/>
              ${item.rejectReason}
            </div>
          `;
        }

        // Action Buttons
        let buttonsHtml = `
          <button class="btn-outline" onclick="alert('Membuka detail id: ${item.id}')">
            <i data-lucide="eye" style="width: 1rem; height: 1rem;"></i> Detail
          </button>
        `;

        if (item.status === 'REJECTED') {
          buttonsHtml += `
            <button class="btn-primary" onclick="alert('Mengarah ke form perbaikan id: ${item.id}')">
              Perbaiki Data
            </button>
          `;
        }

        const card = document.createElement('div');
        card.className = 'list-card';
        card.innerHTML = `
          <div style="display: flex; gap: 1.25rem; align-items: flex-start; flex: 1;">
            <div style="width: 3.5rem; height: 3.5rem; flex-shrink: 0; background: ${iconBg}; border: 1px solid rgba(0,0,0,0.05); color: ${iconColor}; display: flex; align-items: center; justify-content: center;">
              ${iconHtml}
            </div>
            <div style="flex: 1;">
              <h4 style="font-size: 1rem; font-weight: 700; color: #1e293b; margin: 0 0 0.5rem;">${item.title}</h4>
              <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; font-size: 0.75rem; font-weight: 700; color: #64748b;">
                <span style="display: flex; align-items: center; gap: 0.25rem; background: #f8fafc; padding: 0.25rem 0.75rem; border: 1px solid #e2e8f0;">
                  <i data-lucide="users" style="width: 0.875rem; height: 0.875rem; color: #94a3b8;"></i> 
                  ${item.count} ${item.type === 'KEPENGURUSAN' ? 'Pengurus' : 'Anggota'}
                </span>
                <span style="display: flex; align-items: center; gap: 0.25rem; background: #f8fafc; padding: 0.25rem 0.75rem; border: 1px solid #e2e8f0;">
                  <i data-lucide="clock" style="width: 0.875rem; height: 0.875rem; color: #94a3b8;"></i> 
                  Terkirim: ${item.date}
                </span>
              </div>
              ${reasonHtml}
            </div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 0.75rem; flex-shrink: 0;">
            ${badgeHtml}
            <div style="display: flex; gap: 0.5rem;">
              ${buttonsHtml}
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      lucide.createIcons();
    }

    // Initialize Event Listeners for Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        // Remove active from all
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        // Add active to clicked
        e.target.classList.add('active');
        
        // Render
        const filter = e.target.getAttribute('data-filter');
        renderData(filter);
      });
    });

    // Initial render
    renderData('ALL');
  
    function toggleSidebarLayout() {
      const sidebar = document.getElementById('appSidebar');
      const main = document.querySelector('.main-content');
      sidebar.classList.toggle('collapsed');
      main.classList.toggle('expanded');
    }

  </script>
</body>
</html>
