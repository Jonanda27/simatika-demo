<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Draft - SIMATIKA KBG</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest">
    function toggleSidebarLayout() {
      const sidebar = document.getElementById('appSidebar');
      const main = document.querySelector('.main-content');
      sidebar.classList.toggle('collapsed');
      main.classList.toggle('expanded');
    }

  </script>
  <style>
    body {
      background-color: #f8fafc; 
      display: flex;
      min-height: 100vh;
      margin: 0;
      font-family: var(--font-sans);
    }
    
    /* SIDEBAR STYLES */
    
    
    
    .nav-label {
      padding: 0 0.75rem 0.5rem;
      font-size: 0.625rem;
      font-weight: 700;
      color: #5c7cb8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0.75rem;
      color: #8faadd;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.875rem;
      border-radius: 0.5rem;
      margin-bottom: 0.125rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .nav-item:hover {
      background-color: rgba(109, 76, 65, 0.2); 
      color: #a8c1f0;
    }
    .nav-item.active {
      background-color: #6d4b40;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); 
    }
    .nav-item-icon {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .submenu {
      margin-top: 0.25rem;
      margin-left: 1rem;
      padding-left: 0.5rem;
      border-left: 1px solid rgba(30, 41, 59, 1);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .submenu-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      color: #8faadd;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }
    .submenu-item:hover {
      color: #a8c1f0;
      background-color: rgba(109, 76, 65, 0.15);
    }
    .submenu-item.active {
      color: white;
      background-color: #875d41;
      box-shadow: 0 4px 6px -1px rgba(67, 20, 7, 0.3);
    }

    /* MAIN CONTENT */
    
    
    .content-area {
      padding: 2rem;
      max-width: 72rem; /* max-w-6xl */
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* HEADER */
    .page-header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-icon {
      padding: 0.75rem;
      background-color: #fbf9f8; /* brown-50 */
      color: #875d41; /* brown-600 */
      border: 1px solid rgba(101, 67, 33, 0.1);
    }
    .header-title {
      font-size: 1.875rem; /* text-3xl */
      font-weight: 800;
      color: #1e293b; /* slate-800 */
      margin: 0;
      letter-spacing: -0.025em;
    }
    .header-subtitle {
      color: #64748b; /* slate-500 */
      margin: 0.25rem 0 0 0;
      font-weight: 500;
      font-size: 1rem;
    }

    /* TABLE CARD */
    .table-card {
      background: white;
      border: 1px solid rgba(226, 232, 240, 0.8);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.875rem;
    }
    thead {
      background-color: rgba(248, 250, 252, 0.8); /* slate-50/80 */
      color: #475569; /* slate-600 */
      font-size: 0.875rem;
      border-bottom: 1px solid rgba(226, 232, 240, 0.8);
    }
    th {
      padding: 1.25rem;
      font-weight: 700;
    }
    td {
      padding: 1.25rem;
      border-bottom: 1px solid #f1f5f9;
    }
    tr {
      transition: background-color 0.2s;
    }
    tr:hover {
      background-color: rgba(251, 249, 248, 0.3); /* hover:bg-brown-50/30 */
    }

    /* TABLE BADGE */
    .badge-count {
      display: inline-flex;
      align-items: center;
      background: #eff6ff; /* blue-50 */
      color: #1d4ed8; /* blue-700 */
      padding: 0.25rem 0.75rem;
      border: 1px solid #bfdbfe; /* blue-200 */
      font-weight: 700;
      font-size: 0.75rem;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-decoration: none;
    }
    .btn-sm {
      padding: 0.375rem 1rem;
      height: 2rem;
    }
    .btn-brown {
      background: #654321; /* brown-600 */
      color: white;
    }
    .btn-brown:hover { background: #4d3319; }
    
    .btn-outline {
      background: transparent;
      border: 1px solid #e2e8f0;
      color: #64748b;
    }
    .btn-outline:hover {
      color: #e11d48;
      background: #fff1f2;
      border-color: #fecdd3;
    }
    
    .table-footer {
      padding: 1rem;
      background: transparent;
      border-top: 1px solid #f1f5f9;
      font-size: 0.75rem;
      font-weight: 500;
      color: #64748b;
    }

    /* EMPTY STATE */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem;
      color: #94a3b8;
    }
    .empty-icon {
      width: 5rem;
      height: 5rem;
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      color: #cbd5e1;
    }
  </style>
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

    <!-- SIDEBAR -->
  <aside class="sidebar" id="appSidebar">
    <div class="sidebar-header">
      <img src="images/logo.png" alt="Logo" class="sidebar-logo-img" onerror="this.src='https://via.placeholder.com/40';">
      <div class="sidebar-brand-text">
        <span style="font-weight: 700; font-size: 1.125rem; color: white; line-height: 1.1;">SIMATIKA</span>
        <span style="font-size: 0.6875rem; color: #94a3b8;">Keuskupan Timika</span>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <p class="nav-label">MENU KBG</p>
      
      <a href="dashboard.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="home" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Dashboard KBG</span>
        </div>
      </a>
      
      <div class="nav-item " onclick="toggleSubmenu('sensus')">
        <div class="nav-item-icon">
          <i data-lucide="clipboard-list" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Sensus Umat</span>
        </div>
        <i data-lucide="chevron-down" class="submenu-chevron" style="width: 1rem; height: 1rem; transform: rotate(180deg);"></i>
      </div>
      <div class="submenu" id="submenu-sensus" style="display: flex;">
        <a href="pendataan.html" class="submenu-item ">
          <div style="width: 0.375rem; height: 0.375rem; border-radius: 50%; background-color: #475569;" class="sub-dot"></div>
          <span class="nav-text">Form Pendataan</span>
        </a>
        <a href="datadraft.html" class="submenu-item active">
          <div style="width: 0.375rem; height: 0.375rem; border-radius: 50%; background-color: #475569;" class="sub-dot"></div>
          <span class="nav-text">Data Draft</span>
        </a>
      </div>
      
      <a href="semuadata.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="folder-open" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Semua Data</span>
        </div>
      </a>
      
      <a href="datakeluarga.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="user-plus" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Data Keluarga</span>
        </div>
      </a>
      
      <a href="petaumat.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="map" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Peta Umat</span>
        </div>
      </a>
      
      <a href="pengurusaktif.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="users" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Pengurus Aktif</span>
        </div>
      </a>
      
      <a href="pengajuanpengurus.html" class="nav-item ">
        <div class="nav-item-icon">
          <i data-lucide="shield-check" style="width: 1.25rem; height: 1.25rem;"></i>
          <span class="nav-text">Pengajuan Pengurus</span>
        </div>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="circle-badge">N</div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
        <header class="topbar">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button class="btn-hamburger" onclick="toggleSidebarLayout()">
          <i data-lucide="menu" style="width: 1.5rem; height: 1.5rem; color: #475569;"></i>
        </button>
        <h1 class="topbar-title">Data Draft</h1>
      </div>
      <div style="display: flex; align-items: center; gap: 1.25rem;">
        
        <div class="notification-wrapper">
          <i data-lucide="bell" style="width: 1.25rem; height: 1.25rem; color: #475569;"></i>
          <span class="notification-badge">5</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 0.75rem; padding-left: 1.25rem; border-left: 1px solid #e2e8f0;">
          <div style="text-align: right;">
            <p style="font-weight: 700; font-size: 0.875rem; margin: 0; color: #1e293b;">kbg_paulus</p>
            <p style="font-size: 0.75rem; color: #64748b; margin: 0;">Ketua KBG</p>
          </div>
          <div style="width: 2.5rem; height: 2.5rem; background-color: #6d4b40; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">
            KP
          </div>
        </div>
        
        <a href="index.html" class="btn-logout" title="Keluar">
          <i data-lucide="log-out" style="width: 1.25rem; height: 1.25rem; color: #334155;"></i>
        </a>
      </div>
    </header>

    <div class="content-area">
      <!-- HEADER -->
      <div class="page-header">
        <div class="header-icon">
          <i data-lucide="clipboard-list" style="width: 1.5rem; height: 1.5rem;"></i>
        </div>
        <div>
          <h1 class="header-title">Data Draft</h1>
          <p class="header-subtitle">Data keluarga hasil impor yang belum dilengkapi foto atau koordinat lokasi.</p>
        </div>
      </div>

      <!-- TABLE CARD -->
      <div class="table-card" id="draftContainer">
        <!-- Akan di-render via Javascript -->
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    function toggleSubmenu(id) {
      const submenu = document.getElementById('submenu-' + id);
      if (submenu.style.display === 'none') {
        submenu.style.display = 'flex';
        submenu.previousElementSibling.querySelector('i[data-lucide="chevron-down"]').style.transform = 'rotate(180deg)';
      } else {
        submenu.style.display = 'none';
        submenu.previousElementSibling.querySelector('i[data-lucide="chevron-down"]').style.transform = 'rotate(0deg)';
      }
    }

    // DUMMY DATA DRAFT
    let drafts = [
      { id: 1, kk: '9101010101010101', head: 'Hendrikus Wambrauw', count: 4, date: '21 Okt 2024, 09:30' },
      { id: 2, kk: '9101020202020202', head: 'Stefanus Magai', count: 6, date: '21 Okt 2024, 09:35' },
      { id: 3, kk: '-', head: 'Aloysius Rumat', count: 2, date: '22 Okt 2024, 14:15' }
    ];

    function renderDrafts() {
      const container = document.getElementById('draftContainer');
      container.innerHTML = '';

      if (drafts.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <i data-lucide="clipboard-list" style="width: 2.5rem; height: 2.5rem;"></i>
            </div>
            <h3 style="font-size: 1.25rem; font-weight: 700; color: #475569; margin: 0 0 0.5rem 0;">Belum ada draft tersimpan</h3>
            <p style="font-size: 0.875rem; font-weight: 500; margin: 0;">Silakan lakukan Proses Impor Data terlebih dahulu untuk mulai mengisi draft.</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      // Tampilkan tabel jika ada data
      let rowsHtml = '';
      drafts.forEach(draft => {
        rowsHtml += `
          <tr>
            <td style="font-weight: 700; color: #1e293b;">${draft.kk}</td>
            <td style="font-weight: 700; color: #334155;">${draft.head}</td>
            <td>
              <span class="badge-count">
                <i data-lucide="users" style="width: 0.875rem; height: 0.875rem; margin-right: 0.375rem;"></i>
                ${draft.count} Orang
              </span>
            </td>
            <td style="font-weight: 500; color: #64748b;">${draft.date}</td>
            <td>
              <div style="display: flex; gap: 0.5rem; justify-content: center;">
                <button class="btn btn-sm btn-outline" onclick="hapusDraft(${draft.id})" title="Hapus Draft">
                  <i data-lucide="trash-2" style="width: 1rem; height: 1rem;"></i>
                </button>
                <a href="pendataan.html" class="btn btn-sm btn-brown">
                  <i data-lucide="file-edit" style="width: 1rem; height: 1rem; margin-right: 0.5rem;"></i> Lengkapi Data
                </a>
              </div>
            </td>
          </tr>
        `;
      });

      container.innerHTML = `
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>Nomor KK</th>
                <th>Kepala Keluarga</th>
                <th>Jml Anggota</th>
                <th>Waktu Impor</th>
                <th style="text-align: center;">Aksi</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        </div>
        <div class="table-footer">
          Menampilkan ${drafts.length} data draft
        </div>
      `;

      lucide.createIcons();
    }

    function hapusDraft(id) {
      if(confirm('Apakah Anda yakin ingin menghapus draft ini?')) {
        drafts = drafts.filter(d => d.id !== id);
        renderDrafts();
      }
    }

    // Inisialisasi awal
    renderDrafts();
  
    function toggleSidebarLayout() {
      const sidebar = document.getElementById('appSidebar');
      const main = document.querySelector('.main-content');
      sidebar.classList.toggle('collapsed');
      main.classList.toggle('expanded');
    }

  </script>
</body>
</html>
